<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAIFoR – Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8eaf0;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 680px;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7c9cff;
      background: rgba(124, 156, 255, 0.12);
      border: 1px solid rgba(124, 156, 255, 0.25);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .abbr {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #7c9cff;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #7c9cff, #b48fff);
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #a0a8c0;
      margin-bottom: 2.5rem;
    }

    .coming-soon {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #7c9cff 0%, #b48fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: 0.9rem;
      color: #606880;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming Soon</div>

    <h1>Mathew AI Forskning og Rådgivning</h1>
    <div class="abbr">MAIFoR</div>

    <div class="divider"></div>

    <p>Domain-anchored independent research and advisory in AI and machine learning for industrial systems.</p>
  </div>
</body>
</html>
