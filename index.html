<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon-light.svg" />
  <link rel="apple-touch-icon" href="assets/logo-full.png" />
  <title>MAIFoR – Coming Soon</title>

  <meta name="description" content="Domain-anchored independent research and advisory in AI and machine learning for industrial systems." />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp, iMessage, Slack) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MAIFoR" />
  <meta property="og:url" content="https://maifor.no/" />
  <meta property="og:title" content="MAIFoR – Mathew AI Forskning og Rådgivning" />
  <meta property="og:description" content="Domain-anchored independent research and advisory in AI and machine learning for industrial systems." />
  <meta property="og:image" content="https://maifor.no/assets/og-image.png" />
  <meta property="og:image:secure_url" content="https://maifor.no/assets/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="MAIFoR logo" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MAIFoR – Mathew AI Forskning og Rådgivning" />
  <meta name="twitter:description" content="Domain-anchored independent research and advisory in AI and machine learning for industrial systems." />
  <meta name="twitter:image" content="https://maifor.no/assets/og-image.png" />
  <meta name="twitter:image:alt" content="MAIFoR logo" />

  <!-- Theme color (iMessage / Slack accent) -->
  <meta name="theme-color" content="#0a0e1a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8eaf0;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 680px;
    }

    .logo {
      display: block;
      width: clamp(280px, 80%, 540px);
      height: auto;
      margin: 0 auto 2.5rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7c9cff;
      background: rgba(124, 156, 255, 0.12);
      border: 1px solid rgba(124, 156, 255, 0.25);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #a0a8c0;
      margin-bottom: 2.5rem;
    }

    .coming-soon {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #7c9cff 0%, #b48fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .contact {
      margin-top: 2rem;
    }

    .contact a {
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #7c9cff;
      text-decoration: none;
      border: 1px solid rgba(124, 156, 255, 0.45);
      border-radius: 999px;
      padding: 0.55rem 1.6rem;
      background: rgba(124, 156, 255, 0.08);
      transition: background 0.2s, border-color 0.2s;
    }

    .contact a:hover {
      background: rgba(124, 156, 255, 0.18);
      border-color: rgba(124, 156, 255, 0.75);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/logo-full-dark.svg" alt="MAIFoR – Mathew AI Forskning og Rådgivning" class="logo" />

    <div class="badge">Coming Soon</div>

    <h1 class="visually-hidden">Mathew AI Forskning og Rådgivning</h1>
    <div class="visually-hidden">MAIFoR</div>

    <p>Domain-anchored independent research and advisory in AI and machine learning for industrial systems.</p>

    <div class="contact"><a href="mailto:post@maifor.no">Contact Us</a></div>
  </div>
</body>
</html>
